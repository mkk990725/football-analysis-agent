<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>世界杯赛前分析台</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="brand-mark"><img src="favicon.svg" alt="" /></div>
          <div>
            <h1>赛前分析台</h1>
            <p>世界杯赛程 · 模型预测工作台</p>
          </div>
        </div>

        <nav class="side-nav" aria-label="主导航">
          <a class="active" href="index.html">比赛分析</a>
          <a href="config.html">模型配置</a>
          <a href="predict.html">预测模块</a>
          <a href="teams.html">球队资料</a>
          <a href="skills.html">分析技能</a>
        </nav>
      </aside>

      <main class="main-panel">
        <section class="analysis-toolbar">
          <div>
            <span class="muted-label">后台自动更新</span>
            <h1>比赛分析</h1>
            <p>赛程由服务端每 30 秒轮询更新；预测结果来自“预测模块”调用大模型后同步。</p>
          </div>
          <div class="date-panel">
            <div class="date-range-fields">
              <label>
                <span class="muted-label">开始日期</span>
                <input id="dateStart" type="date" />
              </label>
              <label>
                <span class="muted-label">结束日期</span>
                <input id="dateEnd" type="date" />
              </label>
            </div>
            <button id="applyDate" type="button">确定</button>
            <label>
              <span class="muted-label">排序</span>
              <select id="sortMode">
                <option value="score-desc">有预测优先</option>
                <option value="date-asc">比赛日期从近到远</option>
                <option value="date-desc">比赛日期从远到近</option>
              </select>
            </label>
          </div>
        </section>

        <section class="filter-tabs" role="tablist" aria-label="比赛筛选">
          <button class="active" data-filter="all" type="button">全部</button>
          <button data-filter="actionable" type="button">推荐关注</button>
          <button data-filter="watch" type="button">谨慎观察</button>
          <button data-filter="avoid" type="button">建议跳过</button>
          <button data-filter="synced" type="button">待预测</button>
          <button data-filter="review" type="button">已赛复盘</button>
        </section>

        <section class="analysis-layout">
          <section class="match-list-panel">
            <div class="section-head compact">
              <div>
                <span class="muted-label">比赛列表</span>
                <h2>按当前筛选显示</h2>
              </div>
              <div class="day-switcher" aria-label="切换比赛日期">
                <button id="prevMatchDay" type="button" title="前一天">‹</button>
                <button id="nextMatchDay" type="button" title="后一天">›</button>
              </div>
            </div>
            <div class="match-list" id="matchList" aria-label="比赛列表"></div>
          </section>

          <section class="analysis-detail">
            <section class="match-hero" id="matchHero"></section>

            <section class="content-grid">
              <article class="primary-stack" id="matchJudgment">
                <div class="section-head">
                  <div>
                    <span class="muted-label">大模型预测结果</span>
                    <h2>赛前判断</h2>
                  </div>
                  <a class="tag link-tag" id="predictLink" href="predict.html">去预测模块</a>
                </div>
                <div class="prediction-result" id="predictionResult"></div>

                <div class="section-head compact" id="matchScript">
                  <div>
                    <span class="muted-label">走势推演</span>
                    <h2>上半场 / 全场</h2>
                  </div>
                </div>
                <div class="script-panel" id="scriptPanel"></div>
              </article>

              <aside class="side-stack" id="factorSection">
                <div class="section-head compact">
                  <div>
                    <span class="muted-label">Reuters / AP / FIFA / Guardian</span>
                    <h2>赛前信息</h2>
                  </div>
                  <button class="secondary-action" id="prematchUpdate" type="button">更新</button>
                </div>
                <div class="prematch-panel" id="prematchPanel">
                  <div class="empty-state">选择比赛后，点击“更新”检查赛前 24 小时、3-6 小时、60-75 分钟的信息源。</div>
                </div>

                <div class="section-head compact">
                  <div>
                    <span class="muted-label">模型输入</span>
                    <h2>信息完整度</h2>
                  </div>
                </div>
                <div class="factor-note">这里不再展示硬编码预测分数。生成预测后，会展示模型返回的证据、缺口和来源可信度。</div>
                <div class="factor-list" id="factorList"></div>
              </aside>
            </section>
          </section>
        </section>
      </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
