<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>世界杯赛前分析台</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="tabler-adapter.css" />
  </head>
  <body data-page="match-list">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="brand-mark"><img src="favicon.svg" alt="" /></div>
          <div>
            <h1>赛前分析台</h1>
            <p>世界杯赛程 · 模型预测工作台</p>
          </div>
        </div>

        <nav class="side-nav" aria-label="主导航">
          <a class="active" href="index.html">比赛分析</a>
          <a href="config.html">模型配置</a>
          <a href="predict.html">预测模块</a>
          <a href="teams.html">球队资料</a>
          <a href="skills.html">分析技能</a>
        </nav>
      </aside>

      <main class="main-panel list-home">
        <section class="analysis-toolbar compact-hero">
          <div>
            <span class="muted-label">后台自动更新</span>
            <h1>比赛列表</h1>
            <p>选择日期后查看当天比赛。点击任意比赛进入详情页，只展示真实赛程、预测结果、赛前信息和技战术画像。</p>
          </div>
        </section>

        <section class="list-home-card">
          <div class="date-panel">
            <div class="date-range-fields">
              <label>
                <span class="muted-label">开始日期</span>
                <input id="dateStart" type="date" />
              </label>
              <label>
                <span class="muted-label">结束日期</span>
                <input id="dateEnd" type="date" />
              </label>
            </div>
            <button id="applyDate" type="button">确定</button>
            <label>
              <span class="muted-label">排序</span>
              <select id="sortMode">
                <option value="score-desc">已预测优先</option>
                <option value="date-asc">比赛日期从近到远</option>
                <option value="date-desc">比赛日期从远到近</option>
              </select>
            </label>
          </div>

          <section class="filter-tabs" role="tablist" aria-label="比赛筛选">
            <button class="active" data-filter="all" type="button">全部</button>
            <button data-filter="actionable" type="button">推荐关注</button>
            <button data-filter="watch" type="button">谨慎观察</button>
            <button data-filter="avoid" type="button">建议跳过</button>
            <button data-filter="synced" type="button">待预测</button>
            <button data-filter="review" type="button">已赛复盘</button>
          </section>

          <section class="match-list-panel centered-list">
            <div class="section-head compact">
              <div>
                <span class="muted-label">比赛列表</span>
                <h2>按当前筛选显示</h2>
              </div>
              <div class="day-switcher" aria-label="切换比赛日期">
                <button id="prevMatchDay" type="button" title="前一天">‹</button>
                <button id="nextMatchDay" type="button" title="后一天">›</button>
              </div>
            </div>
            <div class="match-list" id="matchList" aria-label="比赛列表"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
