<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>双方球队情报</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="tabler-adapter.css" />
  </head>
  <body>
    <div class="config-shell">
      <aside class="config-nav">
        <div class="brand-block">
          <div class="brand-mark"><img src="favicon.svg" alt="" /></div>
          <div>
            <h1>球队资料</h1>
            <p>教练、球员、来源校验</p>
          </div>
        </div>
        <nav class="side-nav" aria-label="页面导航">
          <a href="index.html">比赛分析</a>
          <a href="config.html">模型配置</a>
          <a href="predict.html">预测模块</a>
          <a class="active" href="teams.html">球队资料</a>
          <a href="skills.html">分析技能</a>
        </nav>
      </aside>

      <main class="config-main">
        <a class="back-link" href="index.html">返回赛程分析台</a>
        <section class="team-match-picker">
          <label>
            <span class="muted-label">选择比赛</span>
            <select id="teamMatchSelect"></select>
          </label>
        </section>
        <section class="detail-hero" id="detailHero"></section>
        <section class="source-policy">
          <h2>信息源优先级</h2>
          <div class="source-grid">
            <article>
              <strong>事实层</strong>
              <p>FIFA 官方赛程、FIFA Match Centre、FIFA 官方文章，用于赛程、首发、事件和官方背景核验。</p>
            </article>
            <article>
              <strong>结构化数据层</strong>
              <p>The Analyst / Opta 世界杯文章，用于真实表现、xG、射门质量和技战术数据校验。</p>
            </article>
            <article>
              <strong>赛前新闻与规则层</strong>
              <p>Reuters、The Guardian、中国体彩网和中国竞彩网，用于赛前新闻、赛果开奖、玩法规则和结算口径。</p>
            </article>
          </div>
        </section>
        <section class="team-detail-grid" id="teamDetailGrid"></section>
      </main>
    </div>

    <script src="data.js"></script>
    <script src="teams.js"></script>
  </body>
</html>
