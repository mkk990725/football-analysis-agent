<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>预测模块</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="config-shell">
      <aside class="config-nav">
        <div class="brand-block">
          <div class="brand-mark"><img src="favicon.svg" alt="" /></div>
          <div>
            <h1>预测模块</h1>
            <p>选择比赛 · 调用大模型</p>
          </div>
        </div>
        <nav class="side-nav" aria-label="页面导航">
          <a href="index.html">比赛分析</a>
          <a class="active" href="predict.html">预测模块</a>
          <a href="config.html">模型配置</a>
          <a href="teams.html">球队资料</a>
          <a href="skills.html">分析技能</a>
        </nav>
      </aside>

      <main class="config-main">
        <section class="config-hero">
          <div>
            <span class="tag">LLM Prediction</span>
            <h1>赛前预测</h1>
            <p>选择日期和比赛后，系统会把赛程、双方球队资料、球员信息、配置权重和分析技能输入大模型。</p>
          </div>
        </section>

        <section class="predict-grid">
          <article class="config-card">
            <h2>选择比赛</h2>
            <label>
              <span class="muted-label">比赛日期</span>
              <input id="predictDate" type="date" value="2026-06-18" />
            </label>
            <label>
              <span class="muted-label">比赛</span>
              <select id="predictMatch"></select>
            </label>
            <button id="runPrediction" type="button" class="primary-action">生成预测</button>
            <p class="config-note">如果模型配置缺失，系统会返回 prompt 输入包，不会保存为正式预测。</p>
          </article>

          <article class="config-card wide">
            <h2>预测输出</h2>
            <pre class="llm-result visible" id="predictResult">请选择比赛后生成预测。</pre>
          </article>
        </section>
      </main>
    </div>

    <script src="data.js"></script>
    <script src="predict.js"></script>
  </body>
</html>
