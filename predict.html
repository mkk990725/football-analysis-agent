<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI智能体任务处理监控台</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: rgba(15, 23, 42, 0.72);
        --panel-strong: rgba(30, 41, 59, 0.86);
        --line: rgba(148, 163, 184, 0.24);
        --accent: #38bdf8;
        --accent-soft: rgba(56, 189, 248, 0.16);
        --text: #e5eefb;
        --muted: #94a3b8;
        --green: #22c55e;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 10%, rgba(56, 189, 248, 0.22), transparent 28%),
          radial-gradient(circle at 80% 0%, rgba(14, 165, 233, 0.14), transparent 28%),
          var(--bg);
      }

      .Navbar {
        height: 68px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        border-bottom: 1px solid var(--line);
        background: rgba(15, 23, 42, 0.82);
        backdrop-filter: blur(18px);
      }

      .logo {
        font-weight: 900;
        letter-spacing: 0;
        color: #fff;
        text-decoration: none;
      }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .back-home {
        color: var(--accent);
        text-decoration: none;
        font-size: 14px;
        font-weight: 800;
      }

      .status-indicator {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #bbf7d0;
        font-size: 14px;
        font-weight: 700;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 18px rgba(34, 197, 94, 0.9);
      }

      .layout {
        display: grid;
        grid-template-columns: 240px minmax(0, 1fr);
        min-height: calc(100vh - 68px);
      }

      .Sidebar {
        padding: 22px 14px;
        border-right: 1px solid var(--line);
        background: rgba(15, 23, 42, 0.62);
        backdrop-filter: blur(18px);
      }

      .MenuItem {
        display: block;
        padding: 12px 14px;
        margin-bottom: 8px;
        color: var(--muted);
        text-decoration: none;
        border-radius: 12px;
        font-weight: 800;
      }

      .MenuItem.active,
      .MenuItem:hover {
        color: var(--text);
        background: var(--accent-soft);
      }

      .MainContent {
        padding: 34px;
      }

      .glass-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 60px rgba(2, 6, 23, 0.34);
      }

      .control-panel {
        max-width: 1100px;
        margin: 0 auto;
        padding: 26px;
      }

      .selector-grid {
        display: grid;
        grid-template-columns: 260px minmax(260px, 1fr);
        gap: 14px;
        margin-bottom: 24px;
      }

      .date-row {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) 42px;
        gap: 8px;
      }

      label span {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      input,
      select {
        width: 100%;
        padding: 12px 13px;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.74);
        outline: none;
      }

      .primary-zone {
        display: flex;
        justify-content: center;
        margin: 26px 0;
      }

      #startButton {
        min-width: 180px;
        padding: 15px 28px;
        border: 0;
        border-radius: 12px;
        color: #082f49;
        background: linear-gradient(135deg, #7dd3fc, var(--accent));
        font-size: 17px;
        font-weight: 950;
        cursor: pointer;
        box-shadow: 0 16px 36px rgba(56, 189, 248, 0.32);
      }

      .secondary-button {
        padding: 12px 16px;
        border: 1px solid rgba(56, 189, 248, 0.38);
        border-radius: 12px;
        color: #e0f2fe;
        background: rgba(56, 189, 248, 0.12);
        font-weight: 900;
        cursor: pointer;
      }

      #startButton:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .Stepper {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 18px 0;
      }

      .Step {
        padding: 13px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        color: #64748b;
        background: rgba(15, 23, 42, 0.56);
        text-align: center;
        font-weight: 900;
      }

      .Step.completed {
        color: #e0f2fe;
        border-color: rgba(56, 189, 248, 0.76);
        background: rgba(56, 189, 248, 0.18);
        box-shadow: inset 0 0 18px rgba(56, 189, 248, 0.14);
      }

      .LogArea {
        height: 200px;
        overflow-y: auto;
        padding: 14px;
        border: 1px solid rgba(56, 189, 248, 0.22);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.42);
        color: #dbeafe;
        font: 13px/1.7 Consolas, "SFMono-Regular", monospace;
      }

      .result-panel {
        max-width: 1100px;
        margin: 18px auto 0;
        padding: 22px;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .result-card {
        min-height: 132px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel-strong);
      }

      .result-card span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .result-card strong {
        display: block;
        margin: 9px 0;
        color: #f8fafc;
        font-size: 19px;
      }

      .analysis-block {
        margin-top: 12px;
        padding: 15px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.64);
      }

      .analysis-block h3 {
        margin: 0 0 8px;
        color: #f8fafc;
        font-size: 15px;
      }

      .analysis-block p,
      .result-card p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.65;
      }

      .source-gap-list {
        margin: 0;
        padding-left: 18px;
        color: #cbd5e1;
        line-height: 1.7;
      }

      .hidden { display: none; }

      @media (max-width: 860px) {
        .layout { grid-template-columns: 1fr; }
        .Sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
        .selector-grid,
        .Stepper,
        .result-grid { grid-template-columns: 1fr; }
        .MainContent { padding: 18px; }
      }
    </style>
  </head>
  <body>
    <nav class="Navbar">
      <a class="logo" href="index.html">智能体工作台</a>
      <div class="nav-actions">
        <a class="back-home" href="index.html">返回主界面</a>
        <div class="status-indicator"><span class="status-dot"></span>运行中</div>
      </div>
    </nav>

    <div class="layout">
      <aside class="Sidebar">
        <a class="MenuItem active" href="index.html">任务概览</a>
        <a class="MenuItem" href="#LogArea">处理日志</a>
        <a class="MenuItem" href="index.html">历史记录</a>
      </aside>

      <main class="MainContent">
        <section class="control-panel glass-card">
          <div class="selector-grid">
            <label>
              <span>比赛日期</span>
              <div class="date-row">
                <button class="secondary-button" id="prevDate" type="button">‹</button>
                <input id="matchDate" type="date" value="2026-06-18" />
                <button class="secondary-button" id="nextDate" type="button">›</button>
              </div>
            </label>
            <label>
              <span>比赛</span>
              <select id="matchSelect"></select>
            </label>
          </div>

          <div class="primary-zone">
            <button id="startButton" type="button">开始处理</button>
            <button id="codexButton" class="secondary-button" type="button">使用 Codex 大脑</button>
          </div>

          <div class="Stepper" id="Stepper">
            <div class="Step" data-step="0">①连接知识库</div>
            <div class="Step" data-step="1">②检索信息</div>
            <div class="Step" data-step="2">③推理分析</div>
            <div class="Step" data-step="3">④生成回复</div>
          </div>

          <div class="LogArea" id="LogArea"></div>
        </section>

        <section class="result-panel glass-card hidden" id="resultPanel"></section>
      </main>
    </div>

    <script>
      const BEIJING_OFFSET_MS = 8 * 60 * 60 * 1000;
      const teamNameZh = {
        Argentina: "阿根廷", Algeria: "阿尔及利亚", Australia: "澳大利亚", Austria: "奥地利",
        Belgium: "比利时", Brazil: "巴西", Canada: "加拿大", "Cape Verde": "佛得角",
        Croatia: "克罗地亚", England: "英格兰", France: "法国", Germany: "德国",
        Ghana: "加纳", Iraq: "伊拉克", Norway: "挪威", Portugal: "葡萄牙",
        Spain: "西班牙", "Congo DR": "刚果（金）", Uzbekistan: "乌兹别克斯坦",
        Colombia: "哥伦比亚", Panama: "巴拿马", "United States": "美国",
        Morocco: "摩洛哥", Scotland: "苏格兰", Haiti: "海地", Paraguay: "巴拉圭",
        "Türkiye": "土耳其", Turkey: "土耳其"
      };
      const matchDate = document.getElementById("matchDate");
      const matchSelect = document.getElementById("matchSelect");
      const startButton = document.getElementById("startButton");
      const codexButton = document.getElementById("codexButton");
      const prevDate = document.getElementById("prevDate");
      const nextDate = document.getElementById("nextDate");
      const logArea = document.getElementById("LogArea");
      const resultPanel = document.getElementById("resultPanel");
      const steps = [...document.querySelectorAll(".Step")];
      let currentMatches = [];

      function zhTeam(name) {
        return teamNameZh[name] || name || "待确认";
      }

      function timestamp() {
        return new Date().toLocaleTimeString("zh-CN", { hour12: false });
      }

      function log(message) {
        const row = document.createElement("div");
        row.textContent = `[${timestamp()}] ${message}`;
        logArea.appendChild(row);
        logArea.scrollTop = logArea.scrollHeight;
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function formatDateKey(date = new Date()) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}${month}${day}`;
      }

      function addDays(isoDate, days) {
        const date = new Date(`${isoDate}T00:00:00Z`);
        date.setUTCDate(date.getUTCDate() + days);
        return date.toISOString().slice(0, 10);
      }

      function shiftSelectedDate(days) {
        matchDate.value = addDays(matchDate.value, days);
        loadMatches().catch((error) => log(`赛程同步失败：${error.message}`));
      }

      function dateRangeKeys(start, end) {
        const keys = [];
        const cursor = new Date(`${start}T00:00:00`);
        const last = new Date(`${end}T00:00:00`);
        while (cursor <= last) {
          keys.push(formatDateKey(cursor));
          cursor.setDate(cursor.getDate() + 1);
        }
        return keys;
      }

      function beijingDateFromIso(isoDateTime) {
        return new Date(new Date(isoDateTime).getTime() + BEIJING_OFFSET_MS).toISOString().slice(0, 10);
      }

      function beijingTimeFromIso(isoDateTime) {
        const shifted = new Date(new Date(isoDateTime).getTime() + BEIJING_OFFSET_MS);
        return `${shifted.toISOString().slice(0, 10)} ${String(shifted.getUTCHours()).padStart(2, "0")}:${String(shifted.getUTCMinutes()).padStart(2, "0")} 北京时间`;
      }

      async function fetchScoreboard(dateKey) {
        const response = await fetch(`/api/scoreboard?dates=${dateKey}`);
        if (!response.ok) throw new Error(`赛程接口 HTTP ${response.status}`);
        return response.json();
      }

      function eventToMatch(event) {
        const competition = event.competitions?.[0] || {};
        const competitors = competition.competitors || [];
        const home = competitors.find((item) => item.homeAway === "home") || competitors[0];
        const away = competitors.find((item) => item.homeAway === "away") || competitors[1];
        const status = competition.status?.type || event.status?.type || {};
        const completed = Boolean(status.completed);
        return {
          id: `espn-${event.id}`,
          date: beijingDateFromIso(event.date),
          kickoffTime: beijingTimeFromIso(event.date),
          group: competition.altGameNote?.replace("FIFA World Cup, ", "") || "世界杯",
          venue: competition.venue?.fullName || competition.venue?.displayName || "待确认球场",
          home: zhTeam(home?.team?.displayName),
          away: zhTeam(away?.team?.displayName),
          score: completed ? `${home?.score ?? 0}-${away?.score ?? 0}` : "未赛",
          status: completed ? "review" : "synced"
        };
      }

      function matchKey(match) {
        return `${match.date}|${[match.home, match.away].sort((a, b) => a.localeCompare(b, "zh-CN")).join("|")}`;
      }

      async function loadMatches() {
        matchSelect.innerHTML = `<option value="">正在同步赛程...</option>`;
        const keys = dateRangeKeys(addDays(matchDate.value, -1), addDays(matchDate.value, 1));
        const payloads = await Promise.all(keys.map(fetchScoreboard));
        const map = new Map();
        payloads.flatMap((payload) => payload.events || [])
          .map(eventToMatch)
          .filter((match) => match.date === matchDate.value)
          .forEach((match) => map.set(matchKey(match), match));
        currentMatches = [...map.values()].sort((a, b) => a.kickoffTime.localeCompare(b.kickoffTime));
        matchSelect.innerHTML = currentMatches.length
          ? currentMatches.map((match, index) => `<option value="${index}">${match.kickoffTime} · ${match.home} vs ${match.away}</option>`).join("")
          : `<option value="">当前日期暂无赛程</option>`;
        startButton.disabled = !currentMatches.length;
      }

      function selectedMatch() {
        return currentMatches[Number(matchSelect.value)];
      }

      function assistantText(payload) {
        const result = payload?.saved?.result || payload?.result || payload;
        return result?.choices?.[0]?.message?.content || result?.choices?.[0]?.text || result?.output_text || "";
      }

      function parsePrediction(payload) {
        if (payload.mode === "prompt-only") return { promptOnly: true, warning: payload.warning, prompt: payload.prompt };
        const summary = payload.saved?.summary || payload.summary;
        if (summary) return summary;
        const text = assistantText(payload);
        try { return JSON.parse(text); } catch {}
        const match = text.match(/\{[\s\S]*\}/);
        if (match) {
          try { return JSON.parse(match[0]); } catch {}
        }
        return { rawText: text || JSON.stringify(payload) };
      }

      function valueText(value, fallback = "待模型给出") {
        if (value === null || value === undefined || value === "") return fallback;
        if (Array.isArray(value)) return value.map((item) => typeof item === "object" ? JSON.stringify(item) : item).join("；");
        if (typeof value === "object") return value.summary || value.text || value.result || JSON.stringify(value);
        return String(value);
      }

      function renderTop3(items) {
        const list = Array.isArray(items) ? items.slice(0, 3) : [];
        if (!list.length) return `<p>模型没有给出娱乐比分前三项。</p>`;
        return `<div class="result-grid">${list.map((item, index) => `
          <article class="result-card">
            <span>娱乐 ${index + 1}</span>
            <strong>${valueText(item.score || item.scoreline || item.result, "-")}</strong>
            <p>${valueText(item.half_full || item.halfFull || item.ht_ft, "半全场未给出")}</p>
          </article>
        `).join("")}</div>`;
      }

      function renderPrediction(payload) {
        const prediction = parsePrediction(payload);
        resultPanel.classList.remove("hidden");
        if (prediction.promptOnly) {
          resultPanel.innerHTML = `<div class="analysis-block"><h3>${prediction.warning}</h3><p>${prediction.prompt}</p></div>`;
          return;
        }
        if (prediction.rawText) {
          resultPanel.innerHTML = `<div class="analysis-block"><h3>模型原文</h3><p>${prediction.rawText}</p></div>`;
          return;
        }
        const sourceCheck = prediction.source_check || prediction.sourceCheck || {};
        const winner = prediction.winner || prediction.win_tendency || prediction.full_time?.winner || prediction.full_time?.tendency;
        const confidence = prediction.confidence || prediction.confidence_score || prediction.source_reliability?.confidence || "模型未给出明确信心程度";
        resultPanel.innerHTML = `
          <div class="result-grid">
            <article class="result-card"><span>胜负倾向</span><strong>${valueText(winner, "模型未给出明确胜负倾向")}</strong><p>信心程度：${valueText(confidence)}</p></article>
            <article class="result-card"><span>是否可分析</span><strong>${prediction.is_analyzable === false ? "建议跳过" : "可分析 / 谨慎观察"}</strong><p>${valueText(prediction.filter_reason, "模型未给出过滤理由")}</p></article>
            <article class="result-card"><span>信息源校验</span><strong>${valueText(sourceCheck.status || sourceCheck.result, "已纳入校验")}</strong><p>${valueText(sourceCheck.summary || prediction.source_reliability, "模型未给出来源摘要")}</p></article>
          </div>
          <div class="analysis-block"><h3>上半场可能走势</h3><p>${valueText(prediction.first_half || prediction.firstHalf)}</p></div>
          <div class="analysis-block"><h3>全场可能走势</h3><p>${valueText(prediction.full_time || prediction.fullTime)}</p></div>
          <div class="analysis-block"><h3>关键依据</h3><p>${valueText(prediction.key_evidence || prediction.evidence)}</p></div>
          <div class="analysis-block"><h3>球队数据校验</h3><p>${valueText(prediction.team_data_check, "模型未单独给出球队数据校验。")}</p></div>
          <div class="analysis-block"><h3>信息源缺口</h3><p>${valueText(prediction.information_gaps || prediction.missing_sources, "需要补 Guardian 直播记录、Opta/The Analyst 文章、FIFA 技术统计和全场录像观察。")}</p></div>
          <div class="analysis-block"><h3>娱乐参考前三项</h3>${renderTop3(prediction.entertainment_top3 || prediction.entertainmentTop3)}</div>
        `;
      }

      function renderSourceNeeds(packageData) {
        resultPanel.classList.remove("hidden");
        resultPanel.innerHTML = `
          <div class="analysis-block">
            <h3>Codex 分析包已生成</h3>
            <p>${packageData.note}</p>
          </div>
          <div class="analysis-block">
            <h3>当前缺失的高价值信息源</h3>
            <ul class="source-gap-list">
              ${packageData.missingSources.map((item) => `<li>${item}</li>`).join("")}
            </ul>
          </div>
          <div class="analysis-block">
            <h3>可发送给 Codex 的分析输入</h3>
            <p>${packageData.prompt}</p>
          </div>
        `;
      }

      async function runTask() {
        const match = selectedMatch();
        if (!match) return;
        startButton.disabled = true;
        startButton.textContent = "处理中...";
        logArea.innerHTML = "";
        resultPanel.classList.add("hidden");
        steps.forEach((step) => step.classList.remove("completed"));

        const tasks = [
          ["正在连接知识库...", async () => {}],
          ["正在检索信息...", async () => loadMatches()],
          ["正在推理分析...", async () => {}],
          ["正在生成回复...", async () => {
            const response = await fetch("/api/predict", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ match })
            });
            if (!response.ok) throw new Error(`预测接口 HTTP ${response.status}`);
            renderPrediction(await response.json());
          }]
        ];

        try {
          for (let index = 0; index < tasks.length; index += 1) {
            await sleep(1500);
            log(tasks[index][0]);
            await tasks[index][1]();
            steps[index].classList.add("completed");
          }
          startButton.textContent = "处理完成";
          alert("所有任务执行完毕！");
        } catch (error) {
          log(`任务失败：${error.message}`);
          startButton.textContent = "重新处理";
        } finally {
          startButton.disabled = false;
        }
      }

      async function runCodexPackage() {
        const match = selectedMatch();
        if (!match) return;
        log("正在生成 Codex 分析包...");
        const response = await fetch("/api/codex-analysis-package", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ match })
        });
        if (!response.ok) {
          log(`Codex 分析包生成失败：HTTP ${response.status}`);
          return;
        }
        renderSourceNeeds(await response.json());
        log("Codex 分析包已生成。");
      }

      matchDate.addEventListener("change", loadMatches);
      prevDate.addEventListener("click", () => shiftSelectedDate(-1));
      nextDate.addEventListener("click", () => shiftSelectedDate(1));
      startButton.addEventListener("click", runTask);
      codexButton.addEventListener("click", runCodexPackage);
      loadMatches().catch((error) => {
        log(`赛程同步失败：${error.message}`);
        startButton.disabled = true;
      });
    </script>
  </body>
</html>
